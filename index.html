<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pomo - Focus Timer</title>
    <style>
        :root {
            --joy-peach: #ff9a9e;
            --joy-lemon: #fecfef;
            --joy-mint: #a18cd1;
            --joy-sky: #fbc2eb;
            --glass: rgba(255, 255, 255, 0.25);
        }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Quicksand', sans-serif;
            color: #4a4a4a;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        /* Status Messages */
        #statusMessage {
            margin-top: 15px;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }
        .status-success { display: block !important; background: rgba(60, 165, 92, 0.2); color: #3ca55c; border: 1px solid rgba(60, 165, 92, 0.3); }
        .status-error { display: block !important; background: rgba(255, 95, 109, 0.2); color: #ff5f6d; border: 1px solid rgba(255, 95, 109, 0.3); }

        h1 { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 20px; border: none; background: rgba(255, 255, 255, 0.5); font-size: 1rem; }
        .timer-display { font-size: 5rem; font-weight: 800; color: white; animation: pulse 2s infinite; margin: 20px 0; }
        
        button { 
            width: 100%; padding: 15px; border-radius: 20px; border: none; background: white; 
            color: #ff9a9e; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .history-section { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; color: white; }
    </style>
</head>
<body>

    <div id="authContainer" class="container">
        <h1>Welcome to Pomo</h1>
        <p style="color: white;">Login to track your focus</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <button id="registerBtn" style="background: transparent; color: white; border: 1px solid white;">Sign Up</button>
        <div id="statusMessage"></div>
    </div>

    <div id="pomoContainer" class="container" style="display: none;">
        <h1>PomoFocus</h1>
        <h2 id="welcomeText" style="color: white;"></h2>
        
        <input type="text" id="taskInput" placeholder="What are you working on?">
        <div class="timer-display" id="timer">25:00</div>
        
        <div style="display: flex; gap: 10px;">
            <button id="startBtn">Start</button>
            <button id="resetBtn" style="background: rgba(255,255,255,0.3); color: white;">Reset</button>
        </div>

        <div class="history-section">
            <h3 style="font-size: 1rem;">Recent Sessions</h3>
            <ul id="taskList" style="list-style: none; padding: 0; font-size: 0.8rem;"></ul>
        </div>

        <button onclick="logout()" style="background: rgba(255,0,0,0.2); color: white; margin-top: 20px;">Log Out</button>
    </div>

    <script>
        // DOM Elements
        const authContainer = document.getElementById('authContainer');
        const pomoContainer = document.getElementById('pomoContainer');
        const statusBox = document.getElementById('statusMessage');
        const timerDisplay = document.getElementById('timer');
        
        let timeLeft = 25 * 60;
        let timerId = null;

        // Auto-login check
        if (localStorage.getItem('pomoToken')) {
            showTimerScreen();
        }

        function showTimerScreen() {
            authContainer.style.display = 'none';
            pomoContainer.style.display = 'block';
            document.getElementById('welcomeText').textContent = `Hello, ${localStorage.getItem('username')}!`;
            loadHistory();
        }

        // Auth Logic
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch('https://pomo-backend-z8qi.onrender.com/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) {
                    statusBox.textContent = "Success! Now Login.";
                    statusBox.className = "status-success";
                } else {
                    statusBox.textContent = "Registration failed.";
                    statusBox.className = "status-error";
                }
            } catch (e) { statusBox.className = "status-error"; statusBox.textContent = "Server offline."; }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch('https://pomo-backend-z8qi.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('pomoToken', data.token);
                    localStorage.setItem('username', user);
                    showTimerScreen();
                } else {
                    statusBox.textContent = "Invalid Login.";
                    statusBox.className = "status-error";
                }
            } catch (e) { console.error(e); }
        });

        // Timer Logic
        document.getElementById('startBtn').addEventListener('click', () => {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(timerId); alert("Finished!"); }
            }, 1000);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            timerDisplay.textContent = "25:00";
        });

        async function loadHistory() {
            const token = localStorage.getItem('pomoToken');
            const res = await fetch('https://pomo-backend-z8qi.onrender.com/my-tasks', {
                headers: { 'Authorization': token }
            });
            if (res.ok) {
                const tasks = await res.json();
                const list = document.getElementById('taskList');
                list.innerHTML = tasks.map(t => `<li>${t.task_name}</li>`).join('');
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
