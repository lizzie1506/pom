<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoFocus | Dark Cherry</title>
    <style>
        /* 1. Global Reset & Body Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #5e0b15; /* Dark Cherry Red Background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* 2. The Sleek Black Card */
        .glass-card {
            background-color: #1a1a1a; /* Charcoal Black */
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
            animation: slideUpFade 0.8s ease-out;
            margin-bottom: 20px;
        }

        h2, h3 {
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: 700;
        }

        h2 { font-size: 2rem; }
        h3 { font-size: 1.2rem; margin-bottom: 15px; }

        /* 3. Input Groups */
        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #2a2a2a;
            color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #D2122E;
            box-shadow: 0 0 10px rgba(210, 18, 46, 0.3);
            transform: translateY(-2px);
        }

        /* 4. Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #loginBtn {
            background-color: #D2122E; /* Cherry Red */
            color: white;
            border: none;
        }

        #loginBtn:hover {
            background-color: #f01e3c;
            transform: translateY(-2px);
        }

        #signupBtn {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #444;
        }

        #signupBtn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        /* 5. Timer Styling */
        #timerDisplay {
            font-size: 4rem;
            color: #ffffff;
            font-weight: 700;
            margin: 20px 0;
        }

        #statusBox {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 1.5em;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        #historyContainer {
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            max-width: 400px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }

        #historyList {
            list-style: none;
            padding: 0;
        }

        #historyList li {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            color: #eee;
            font-size: 0.9rem;
            border-left: 4px solid #D2122E;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="authContainer" class="glass-card">
        <h2>PomoFocus</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <div class="button-group">
            <button id="loginBtn">Login</button>
            <button id="signupBtn">Sign Up</button>
        </div>
        <p id="statusBox"></p>
    </div>

    <div id="pomoContainer" class="glass-card" style="display: none;">
        <h2 id="welcomeText">Focus Time</h2>
        <div id="timerDisplay">25:00</div>
        <div class="button-group">
            <button id="startBtn" style="background-color: #27ae60; color: white; border: none;">Start</button>
            <button id="resetBtn" style="background-color: #555; color: white; border: none;">Reset</button>
            <button onclick="logout()" style="background-color: transparent; color: #888; border: none; font-size: 0.9rem;">Logout</button>
        </div>
    </div>

    <div id="historyContainer" class="glass-card" style="display: none;">
        <h3>Focus History</h3>
        <ul id="historyList"></ul>
    </div>

    <script>
        // DOM Elements
        const authContainer = document.getElementById('authContainer');
        const pomoContainer = document.getElementById('pomoContainer');
        const historyContainer = document.getElementById('historyContainer');
        const statusBox = document.getElementById('statusBox');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const timerText = document.getElementById('timerDisplay');

        let timeLeft = 25 * 60;
        let timerId = null;

        window.onload = async () => {
            const token = localStorage.getItem('pomoToken');
            if (token) {
                showApp();
            }
        };

        function showApp() {
            authContainer.style.display = 'none';
            pomoContainer.style.display = 'block';
            historyContainer.style.display = 'block';
            const user = localStorage.getItem('username') || 'User';
            document.getElementById('welcomeText').innerText = `Hello, ${user}`;
            loadHistory();
        }

        function updateStatus(msg, color) {
            statusBox.innerText = msg;
            statusBox.style.color = color;
        }

        loginBtn.addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!user || !pass) return updateStatus("Please fill all fields", "orange");
            updateStatus("Logging in...", "white");

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('pomoToken', data.token);
                    localStorage.setItem('username', user);
                    showApp();
                } else {
                    updateStatus(data.error || "Login failed", "#ff4d4d");
                }
            } catch (err) {
                updateStatus("Server error. Try again.", "yellow");
            }
        });

        signupBtn.addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    updateStatus("Account created! You can login now.", "#2ecc71");
                } else {
                    const data = await res.json();
                    updateStatus(data.error || "Signup failed", "#ff4d4d");
                }
            } catch (err) {
                updateStatus("Connection error", "#ff4d4d");
            }
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    saveFocusSession();
                    alert("Focus session complete!");
                    timeLeft = 25 * 60;
                    timerText.innerText = "25:00";
                }
            }, 1000);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            timerText.innerText = "25:00";
        });

        function logout() {
            localStorage.clear();
            location.reload();
        }

        async function saveFocusSession() {
            const token = localStorage.getItem('pomoToken');
            try {
                const response = await fetch('/start-task', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ taskName: "Focus Session" })
                });

                if (response.ok) {
                    loadHistory();
                }
            } catch (err) {
                console.error("Failed to save session:", err);
            }
        }

        async function loadHistory() {
    const token = localStorage.getItem('pomoToken');
    
    // 1. Tell the browser WHERE to go (Your Render URL + /history)
    const backendURL = "https://pomo-backend-slsl.onrender.com/history"; 

    try {
        const response = await fetch(backendURL, {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });

        if (response.ok) {
            const data = await response.json();
            displayHistory(data); // Call a function to show it on screen
        } else {
            console.error("History fetch failed with status:", response.status);
        }
    } catch (err) {
        console.error("Network Error:", err);
    }
}
    </script>
</body>
</html>
