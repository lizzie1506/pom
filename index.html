<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomo Focus | Workspace Edition</title>
    <style>
        /* 1. CORE STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://t3.ftcdn.net/jpg/03/16/91/28/360_F_316912806_S76reL7shSpxvjI9vGv12S28vK9vO8S6.jpg') no-repeat center center/cover;
            color: #3d2b1f;
        }

        /* 2. GLASS CONTAINERS */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: none; /* Hidden by default */
        }

        /* LOGIN BOX */
        #authContainer { width: 900px; height: 550px; display: flex; }
        .auth-left { flex: 1.2; }
        .auth-right { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; background: rgba(255, 255, 255, 0.2); }

        /* MAIN APP BOX */
        #mainApp { width: 450px; padding: 40px; text-align: center; }

        /* 3. TIMER & TEXT STYLES */
        #timerDisplay { font-size: 5rem; font-weight: bold; margin: 20px 0; color: #3d2b1f; }
        h2 { margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #6d5f52; margin-bottom: 25px; }

        /* 4. FORM & BUTTON ELEMENTS */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(74, 63, 53, 0.2);
            border-radius: 8px;
            outline: none;
            color: #3d2b1f;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary { background: #3d2b1f; color: white; }
        .btn-primary:hover { background: #5d4a3a; transform: translateY(-2px); }
        
        .btn-outline { background: transparent; border: 1px solid #3d2b1f; color: #3d2b1f; }
        .btn-outline:hover { background: rgba(61, 43, 31, 0.1); }

        /* 5. HISTORY SECTION */
        #historySection {
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            padding-top: 15px;
            border-top: 1px solid rgba(74, 63, 53, 0.2);
        }
        .history-item {
            font-size: 0.85rem;
            padding: 8px;
            border-bottom: 1px solid rgba(74, 63, 53, 0.1);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="authContainer" class="glass-panel" style="display: flex;">
        <div class="auth-left"></div>
        <div class="auth-right">
            <h2 id="authTitle">Focus Time</h2>
            <p class="subtitle">Sign in to start your session.</p>
            <input type="text" id="userInput" placeholder="Username">
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn btn-primary" onclick="handleAuth()" id="authBtn">Log In</button>
            <p style="margin-top:15px; font-size:0.8rem;">
                <a href="#" onclick="toggleAuthMode()" id="toggleLink" style="color:#8b5e3c; text-decoration:none;">Create an account</a>
            </p>
        </div>
    </div>

    <div id="mainApp" class="glass-panel">
        <h2>Pomo Focus</h2>
        <input type="text" id="taskInput" placeholder="What are you working on?">
        
        <div id="timerDisplay">25:00</div>
        
        <button class="btn btn-primary" onclick="startTimer()" id="startBtn">Start Focus</button>
        <button class="btn btn-outline" onclick="resetTimer()">Reset</button>
        <button class="btn btn-outline" onclick="logout()" style="margin-top: 20px; color: #8b5e3c; border-color: #8b5e3c;">Logout</button>

        <div id="historySection">
            <h4 style="margin-bottom: 10px;">Your History</h4>
            <div id="historyList">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://pomo-backend-slsl.onrender.com";
        let isLogin = true;
        let timerId;
        let timeLeft = 25 * 60;

        // --- AUTH LOGIC ---
        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Focus Time" : "Join Us";
            document.getElementById('authBtn').innerText = isLogin ? "Log In" : "Sign Up";
            document.getElementById('toggleLink').innerText = isLogin ? "Create an account" : "Login instead";
        }

        async function handleAuth() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const route = isLogin ? "/login" : "/register";

            const res = await fetch(`${API_URL}${route}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await res.json();
            if (res.ok) {
                if(isLogin) {
                    localStorage.setItem('pomoToken', data.token);
                    showApp();
                } else {
                    alert("Account created! Now login.");
                    toggleAuthMode();
                }
            } else { alert(data.error); }
        }

        // --- NAVIGATION ---
        function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadHistory();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // --- TIMER LOGIC ---
        function startTimer() {
            if (timerId) return;
            const btn = document.getElementById('startBtn');
            btn.innerText = "Focusing...";
            
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    saveSession();
                    alert("Session Complete!");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateDisplay();
            document.getElementById('startBtn').innerText = "Start Focus";
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = 
                `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // --- DATABASE SYNC ---
        async function saveSession() {
            const task = document.getElementById('taskInput').value || "Deep Work";
            const token = localStorage.getItem('pomoToken');

            await fetch(`${API_URL}/start-task`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ taskName: task })
            });
            loadHistory();
        }

        async function loadHistory() {
            const token = localStorage.getItem('pomoToken');
            const res = await fetch(`${API_URL}/my-tasks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = data.map(t => `
                <div class="history-item">
                    <span>${t.task_name}</span>
                    <span style="color:#8b5e3c">${new Date(t.created_at).toLocaleDateString()}</span>
                </div>
            `).join('');
        }

        // --- AUTO-LOGIN ON LOAD ---
        window.onload = () => {
            if (localStorage.getItem('pomoToken')) showApp();
        };
    </script>
</body>
</html>
