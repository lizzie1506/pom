<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoFocus Login</title>
    <style>
        /* 1. Global Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    /* Solid Cherry Red Background */
    background-color: #D2122E; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* 2. Centered White Login Card */
.login-card {
    background-color: #ffffff;
    padding: 2.5rem;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 380px;
    text-align: center;
}

h2 {
    color: #333;
    margin-bottom: 1.5rem;
    font-size: 1.8rem;
}

/* 3. Input Styling */
.input-group {
    margin-bottom: 1rem;
    text-align: left;
}

input {
    width: 100%;
    padding: 12px 15px;
    margin-top: 5px;
    border: 2px solid #eee;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #D2122E; /* Border turns red when typing */
}

/* 4. Login Button */
#loginBtn {
    width: 100%;
    padding: 12px;
    background-color: #333; /* Dark button looks sleek on white/red */
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.1s;
    margin-top: 1rem;
}

#loginBtn:hover {
    background-color: #000;
}

#loginBtn:active {
    transform: scale(0.97);
}

/* 5. Status Text */
#statusBox {
    margin-top: 1rem;
    font-size: 0.9rem;
    font-weight: 500;
}
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button id="loginBtn">Login</button>
        <p id="statusBox"></p>
    </div>
</body>

    <script>
        // DOM Elements
        const authContainer = document.getElementById('authContainer');
        const pomoContainer = document.getElementById('pomoContainer');
        const statusBox = document.getElementById('statusMessage');
        const timerDisplay = document.getElementById('timer');
        
        let timeLeft = 25 * 60;
        let timerId = null;

        // Auto-login check
        if (localStorage.getItem('pomoToken')) {
            showTimerScreen();
        }

        function showTimerScreen() {
            authContainer.style.display = 'none';
            pomoContainer.style.display = 'block';
            document.getElementById('welcomeText').textContent = `Hello, ${localStorage.getItem('username')}!`;
            loadHistory();
        }

        // Auth Logic
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch('https://pomo-backend-z8qi.onrender.com/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) {
                    statusBox.textContent = "Success! Now Login.";
                    statusBox.className = "status-success";
                } else {
                    statusBox.textContent = "Registration failed.";
                    statusBox.className = "status-error";
                }
            } catch (e) { statusBox.className = "status-error"; statusBox.textContent = "Server offline."; }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            try {
                const res = await fetch('https://pomo-backend-z8qi.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('pomoToken', data.token);
                    localStorage.setItem('username', user);
                    showTimerScreen();
                } else {
                    statusBox.textContent = "Invalid Login.";
                    statusBox.className = "status-error";
                }
            } catch (e) { console.error(e); }
        });

        // Timer Logic
        document.getElementById('startBtn').addEventListener('click', () => {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) { clearInterval(timerId); alert("Finished!"); }
            }, 1000);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            timerDisplay.textContent = "25:00";
        });

        async function loadHistory() {
            const token = localStorage.getItem('pomoToken');
            const res = await fetch('https://pomo-backend-z8qi.onrender.com/my-tasks', {
                headers: { 'Authorization': token }
            });
            if (res.ok) {
                const tasks = await res.json();
                const list = document.getElementById('taskList');
                list.innerHTML = tasks.map(t => `<li>${t.task_name}</li>`).join('');
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
